<p-card styleClass="movie-card" *ngIf="movie">
  
  <ng-template pTemplate="header">
    <img [src]="movie.poster" alt="Poster" class="movie-bg-poster">
    <div class="card-overlay"></div>
  </ng-template>

  <div class="card-header">
    <div class="badge-row">
      <span class="movie-rating">⭐ {{ movie.rating }}</span>
      <span class="age-limit" [ngClass]="getAgeClass(movie.ageLimit)">{{ movie.ageLimit }}</span>
    </div>
    <h3 class="movie-title">
      {{ movie.title }} <span class="movie-year">({{ movie.year }})</span>
    </h3>
  </div>

  <div class="card-body">
    <div class="meta-line"><b>Режисер:</b> {{ movie.director }}</div>
    <div class="meta-line"><b>Жанр:</b> {{ movie.genre }}</div>
    <div class="movie-duration">
      <b>Тривалість:</b>
      <span class="time-value">{{ movie.durationInMins | duration }}</span>
    </div>
    <p class="movie-description">{{ movie.description }}</p>
  </div>

  <ng-template pTemplate="footer">
    <div class="card-footer-actions">
      
      <p-button label="Детальніше" styleClass="btn-details"></p-button>
      
      <div class="movie-icons" [hidden]="hideActions">
        
        <p-button 
          [icon]="movie.isFavorite ? 'pi pi-heart-fill' : 'pi pi-heart'" 
          [styleClass]="'btn btn-heart' + (movie.isFavorite ? ' active' : '')" 
          (onClick)="toggleFavorite($event)" 
          title="Улюблене">
        </p-button>
        
        <p-button 
          [icon]="movie.isWatchLater ? 'pi pi-bookmark-fill' : 'pi pi-bookmark'" 
          [styleClass]="'btn btn-clock' + (movie.isWatchLater ? ' active' : '')" 
          (onClick)="toggleWatchLater($event)" 
          title="Подивитись пізніше">
        </p-button>
        
      </div>
    </div>
  </ng-template>

</p-card>
